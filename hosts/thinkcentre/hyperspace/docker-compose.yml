services:
  spacetimedb:
    image: ghcr.io/scriptogre/spacetimedb:hypermedia
    container_name: spacetimedb
    command: ["start"]
    environment:
      SPACETIMEDB_STATIC_DIR: /srv/hyperspace/static
    ports:
      - "3000:3000"
    volumes:
      - hyperspace_stdb:/stdb
      - hyperspace_static:/srv/hyperspace/static:ro
    restart: unless-stopped

volumes:
  hyperspace_stdb:
  hyperspace_static:
