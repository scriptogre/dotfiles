services:
  openclaw-gtfd-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gtfd
    env_file: .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Europe/Bucharest
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ../../../common/gtfd/SKILL.md:/home/node/.openclaw/workspace/GTFD-SKILL.md:ro
    ports:
      - "18791:18791"
    networks:
      - default
      - proxy
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18791"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18791/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-gtfd-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gtfd-cli
    network_mode: "service:openclaw-gtfd-gateway"
    env_file: .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Europe/Bucharest
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ../../../common/gtfd/SKILL.md:/home/node/.openclaw/workspace/GTFD-SKILL.md:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on: [openclaw-gtfd-gateway]
    profiles: ["cli"]

networks:
  proxy:
    external: true
