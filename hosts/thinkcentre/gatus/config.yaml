alerting:
  email:
    from: "status@christiantanul.com"
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "${RESEND_API_KEY}"
    to: "homelab@christiantanul.com"
    default-alert:
      enabled: true
      failure-threshold: 2
      success-threshold: 2
      send-on-resolved: true

storage:
  type: sqlite
  path: /data/gatus.db

ui:
  title: "Homelab Status"
  header: "Homelab Status"

endpoints:
  - name: "DNS (AdGuard 1)"
    group: "Infra"
    url: "192.168.0.12:53"
    interval: 60s
    dns:
      query-name: "christiantanul.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
      - "[BODY] == 192.168.0.12"
    alerts:
      - type: email

  - name: "DNS (AdGuard 2)"
    group: "Infra"
    url: "100.114.162.56:53"
    interval: 60s
    dns:
      query-name: "christiantanul.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
      - "[BODY] == 192.168.0.12"
    alerts:
      - type: email

  - name: "Internet"
    group: "Infra"
    url: "icmp://1.1.1.1"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email

  - name: "Tailscale → Synology-2"
    group: "Infra"
    url: "icmp://100.114.162.56"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email

  - name: "Tailscale → Proxmox"
    group: "Infra"
    url: "icmp://100.122.66.112"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email

  - name: "Disk Space"
    group: "Health"
    url: "http://gatus-helper:8080/cgi-bin/disk.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email

  - name: "Docker Containers"
