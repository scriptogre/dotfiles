services:
  home-assistant:
    container_name: home-assistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    ports:
      - "8123:8123"
    expose: [ 8123 ]
    networks:
      - proxy
      - default
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /var/run/dbus:/run/dbus:ro
      - /mnt/nas/media_server:/media/synology_media_server
      - /mnt/nas/homes:/media/synology_homes
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: curl -k http://localhost:8123 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

