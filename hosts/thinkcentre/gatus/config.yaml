# Gatus monitoring configuration for the homelab.
# Dashboard: status.christiantanul.com (LAN/Tailscale only)
# Alerts: email via Resend SMTP to homelab@christiantanul.com
#
# Groups = devices. Endpoint names are just the service.
# Email subjects read as: "ThinkCentre/Plex", "Synology-2/AdGuard DNS", etc.
#
# The gatus-helper container (Alpine + busybox httpd) exposes system-level
# checks as CGI scripts that return 200/503 JSON responses.

alerting:
  email:
    from: "Status <status@christiantanul.com>"
    host: "smtp.resend.com"
    port: 587
    username: "resend"
    password: "${RESEND_API_KEY}"
    to: "homelab@christiantanul.com"
    default-alert:
      enabled: true
      failure-threshold: 10
      success-threshold: 5
      send-on-resolved: true

storage:
  type: sqlite
  path: /data/gatus.db

ui:
  title: "Homelab Status"
  header: "Homelab Status"

endpoints:

  # ─── ThinkCentre ───────────────────────────────────────────
  # Infrastructure, system health, and Docker services on the
  # ThinkCentre m80q. Infra checks run every 2m, the rest 5m.

  - name: "AdGuard DNS"
    group: "ThinkCentre"
    url: "192.168.0.12"
    interval: 2m
    dns:
      query-name: "christiantanul.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
    alerts:
      - type: email
        description: "Primary DNS (AdGuard on ThinkCentre) is not resolving queries. All local domain resolution depends on this."

  - name: "Internet"
    group: "ThinkCentre"
    url: "icmp://1.1.1.1"
    interval: 2m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email
        description: "ThinkCentre cannot reach the internet (ping to 1.1.1.1 failed). Check router, ISP, or ethernet cable."

  - name: "Tailscale → Synology-2"
    group: "ThinkCentre"
    url: "icmp://100.114.162.56"
    interval: 2m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email
        description: "Cannot reach Synology-2 at remote site via Tailscale. The device may be offline or Tailscale disconnected."

  - name: "Disk Space"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/disk.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Disk usage exceeded 85% on one or more mount points (/, /home, or NAS mounts). Check with 'df -h' on ThinkCentre."

  - name: "Docker"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/docker.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "One or more Docker containers are stopped or unhealthy. Run 'docker ps -a' on ThinkCentre to see which."

  - name: "SMB Mounts"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/mounts.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Synology NAS SMB mounts (/mnt/nas/*) are inaccessible. The Synology may be down or the network path broken."

  - name: "Syncthing"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/syncthing.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Syncthing Projects folder has sync errors. Changes between Mac and ThinkCentre may not be propagating. Check syncthing.christiantanul.com."

  - name: "Systemd"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/systemd-failed.sh"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "One or more systemd units on the ThinkCentre are in failed state. SSH and run 'systemctl --failed' to see which."

  - name: "AdGuard"
    group: "ThinkCentre"
    url: "http://adguard:80"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "AdGuard Home DNS server web UI is down. DNS may still work but management is inaccessible."

  - name: "AdGuard Sync"
    group: "ThinkCentre"
    url: "http://adguard-sync:8080"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "AdGuard sync service is down. DNS rewrites will no longer propagate from AdGuard 1 to AdGuard 2."

  # Home Assistant returns 401 when not logged in — that's fine, it means the service is up.
  - name: "Home Assistant"
    group: "ThinkCentre"
    url: "http://home-assistant:8123"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 401)"
    alerts:
      - type: email
        description: "Home Assistant is not responding. Smart home automations, sensors, and integrations are offline."

  - name: "Vaultwarden"
    group: "ThinkCentre"
    url: "http://vaultwarden:80"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Vaultwarden password manager is down. Bitwarden clients won't be able to sync."

  - name: "Vaultwarden Backup"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/vaultwarden-backup.sh"
    interval: 15m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Vaultwarden backup is unhealthy — either stale (>25h old), local backup failed, or both Synology targets failed. SSH to ThinkCentre and check 'journalctl -u vaultwarden-backup'."

  - name: "1Password Export"
    group: "ThinkCentre"
    url: "http://gatus-helper:8080/cgi-bin/onepassword-export.sh"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "1Password daily export is stale (>36h old) or missing on Synology. Check the Mac's launchd log: ~/Library/Logs/onepassword-export.log"

  - name: "Umami"
    group: "ThinkCentre"
    url: "http://umami:3000"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Umami web analytics is down. Analytics tracking for sites will stop collecting data."

  # CouchDB returns 401 without auth — means the service is running.
  - name: "Obsidian Sync"
    group: "ThinkCentre"
    url: "http://obsidian-couchdb:5984"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 401)"
    alerts:
      - type: email
        description: "Obsidian LiveSync CouchDB is down. Obsidian notes will stop syncing between devices."

  - name: "Plex"
    group: "ThinkCentre"
    url: "http://192.168.0.12:32400/web"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Plex media server is not responding."

  - name: "Cockpit"
    group: "ThinkCentre"
    url: "http://192.168.0.12:9090"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Cockpit system management UI is down. Web-based terminal and system monitoring unavailable."

  # Healthclaw returns 404 on root (no index route) — any HTTP response means it's alive.
  - name: "Healthclaw"
    group: "ThinkCentre"
    url: "http://healthclaw:8099"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 404)"
    alerts:
      - type: email
        description: "Healthclaw health data API is down."

  # SpacetimeDB may return various codes depending on state — any response means alive.
  - name: "SpacetimeDB"
    group: "ThinkCentre"
    url: "http://spacetimedb:3000"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302, 404)"
    alerts:
      - type: email
        description: "SpacetimeDB game server is not responding."

  # OpenClaw containers are on their own Docker network, so we reach them via host IP.
  - name: "OpenClaw"
    group: "ThinkCentre"
    url: "http://192.168.0.12:18789"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302, 404)"
    alerts:
      - type: email
        description: "OpenClaw AI assistant is not responding."

  - name: "OpenClaw Legal"
    group: "ThinkCentre"
    url: "http://192.168.0.12:18790"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302, 404)"
    alerts:
      - type: email
        description: "OpenClaw Legal assistant is not responding."

  - name: "Sonarr"
    group: "ThinkCentre"
    url: "http://sonarr:8989"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Sonarr (TV show manager) is down."

  - name: "Radarr"
    group: "ThinkCentre"
    url: "http://radarr:7878"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Radarr (movie manager) is down."

  - name: "Prowlarr"
    group: "ThinkCentre"
    url: "http://prowlarr:9696"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Prowlarr (indexer aggregator for Sonarr/Radarr) is down."

  - name: "qBittorrent"
    group: "ThinkCentre"
    url: "http://qbittorrent:9865"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "qBittorrent is down."

  - name: "Wakapi"
    group: "ThinkCentre"
    url: "http://wakapi:3000/api/health"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Wakapi coding time tracker is down."

  # ─── Public Sites ──────────────────────────────────────────
  # External-facing websites behind Caddy. Checked via HTTPS
  # through Cloudflare to verify the full chain works.

  # Static site — currently empty (404), but checking the full HTTPS chain.
  - name: "christiantanul.com"
    group: "Public"
    url: "https://christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 404)"
    alerts:
      - type: email
        description: "christiantanul.com is unreachable. Caddy or Cloudflare may be down."

  - name: "intreabalegea.ro"
    group: "Public"
    url: "https://intreabalegea.ro"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "intreabalegea.ro (Django app) is down."

  - name: "staging.intreabalegea.ro"
    group: "Public"
    url: "https://staging.intreabalegea.ro"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "intreabalegea.ro staging environment is down."

  - name: "Roast Roulette"
    group: "Public"
    url: "https://roastroulette.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Roast Roulette app is down."

  - name: "Analytics (Umami)"
    group: "Public"
    url: "https://analytics.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Umami analytics dashboard is unreachable via its public URL."

  - name: "Bad Apple"
    group: "Public"
    url: "https://bad-apple.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Bad Apple app is down."

  - name: "Clinical Trials Scout"
    group: "Public"
    url: "https://clinical-trials-scout.alexandrutanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Clinical Trials Scout (Alexandru's app) is down."

  - name: "game.razvanaga.com"
    group: "Public"
    url: "https://game.razvanaga.com"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Razvan's game site is down."

  # Static game files — may return 404 if no index, any response means Caddy is serving.
  - name: "Game (Hyperspace)"
    group: "Public"
    url: "https://game.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == any(200, 404)"
    alerts:
      - type: email
        description: "Hyperspace game site is unreachable."

  # Gitea runs on the Synology — will fail when Synology is down.
  - name: "Gitea"
    group: "Public"
    url: "https://gitea.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "Gitea git server is down. Runs on Synology — check if NAS is online."

  # Protected by basic auth — 401 means Caddy is serving correctly.
  - name: "Dosar"
    group: "Public"
    url: "https://dosar.christiantanul.com"
    interval: 5m
    conditions:
      - "[STATUS] == 401"
    alerts:
      - type: email
        description: "Dosar document viewer is unreachable."

  # ─── Synology DS923+ (192.168.0.14) ───────────────────────
  # NAS at home. All endpoints go down together if the NAS
  # shuts off (e.g., thermal shutdown).

  - name: "Ping"
    group: "Synology"
    url: "icmp://192.168.0.14"
    interval: 5m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email
        description: "Synology DS923+ NAS is not responding to ping. It may have shut down (check email for thermal alerts) or lost network."

  - name: "DSM"
    group: "Synology"
    url: "http://192.168.0.14:5000"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology DSM web interface is down."

  - name: "Downloads"
    group: "Synology"
    url: "http://192.168.0.14:1337"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Download manager is down on Synology."

  - name: "Photos"
    group: "Synology"
    url: "http://192.168.0.14:5080"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Photos is down."

  - name: "Drive"
    group: "Synology"
    url: "http://192.168.0.14:10002"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Drive is down. File sync between devices will stop."

  - name: "Files"
    group: "Synology"
    url: "http://192.168.0.14:7000"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology File Station is down."

  - name: "Calendar"
    group: "Synology"
    url: "http://192.168.0.14:20002"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Calendar (CalDAV) is down. Calendar sync will stop."

  - name: "Contacts"
    group: "Synology"
    url: "http://192.168.0.14:25555"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Contacts (CardDAV) is down. Contact sync will stop."

  - name: "Mail"
    group: "Synology"
    url: "http://192.168.0.14:21680"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology MailPlus is down."

  - name: "Surveillance"
    group: "Synology"
    url: "http://192.168.0.14:9900"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Surveillance Station is down. Camera recording and monitoring stopped."

  - name: "VMs"
    group: "Synology"
    url: "http://192.168.0.14:14640"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology Virtual Machine Manager is down."

  # ─── Synology-2 (remote site, via Tailscale) ──────────────

  - name: "Ping"
    group: "Synology-2"
    url: "icmp://100.114.162.56"
    interval: 5m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: email
        description: "Synology-2 at remote site is not responding. Device may be offline or Tailscale disconnected."

  - name: "DSM"
    group: "Synology-2"
    url: "http://100.114.162.56:5000"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Synology-2 DSM web interface is down."

  - name: "AdGuard"
    group: "Synology-2"
    url: "http://100.114.162.56:8080"
    interval: 5m
    client:
      timeout: 10s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: email
        description: "AdGuard Home on Synology-2 is down. Secondary/failover DNS is unavailable."

  - name: "AdGuard DNS"
    group: "Synology-2"
    url: "100.114.162.56"
    interval: 2m
    dns:
      query-name: "christiantanul.com"
      query-type: "A"
    conditions:
      - "[DNS_RCODE] == NOERROR"
    alerts:
      - type: email
        description: "Secondary DNS (AdGuard on Synology-2) is not resolving queries. Failover DNS for when primary is unreachable."

  # ─── Proxmox (via Tailscale) ───────────────────────────────

  # Brother's PC — alerts disabled since he turns it on/off frequently.
  - name: "Proxmox (Brother's PC)"
    group: "Remote"
    url: "https://100.122.66.112:8006"
    interval: 5m
    client:
      timeout: 10s
      insecure: true
    conditions:
      - "[STATUS] == any(200, 301, 302)"
    alerts:
      - type: email
        description: "Proxmox hypervisor is unreachable. VMs running on it may also be affected."
        enabled: false
